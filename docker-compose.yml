services:
  mongodb:
    image: mongo:7.0
    container_name: iot-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: city_environment
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: city_environment
      MONGO_COLLECTION: sensor_measurements
      DATA_FILE: data/sample_iot_telemetry_data.csv
      BATCH_SIZE: 1000
    volumes:
      - .:/app
    working_dir: /app

  pipeline:
    build: .
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: city_environment
      MONGO_COLLECTION: sensor_measurements
      DATA_FILE: data/sample_iot_telemetry_data.csv
      BATCH_SIZE: 1000
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "
      python scripts/init_db.py &&
      python scripts/load_data.py &&
      python scripts/validate_data.py &&
      python scripts/example_queries.py
      "
    restart: "no"

volumes:
  mongo-data: